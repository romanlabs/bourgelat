services:
  db:
    image: postgres:16-alpine
    container_name: bourgelat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bourgelat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bourgelat_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bourgelat-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bourgelat_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      FRONTEND_URL: http://localhost:5173
      FRONTEND_URLS: http://localhost:5173
      PUBLIC_UPLOADS_BASE_URL: http://localhost:3000/uploads
      TRUST_PROXY: "false"
      COOKIE_SECURE: "false"
      DB_SSL: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bourgelat-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres-data:
  backend-uploads:
  backend-logs:
